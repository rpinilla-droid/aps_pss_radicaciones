<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Radicaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hidden-section { display: none !important; }
        .nav-active { border-bottom: 4px solid #3b82f6; color: white; }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen font-sans">

    <!-- LOGIN -->
    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="max-w-[400px] w-full bg-white rounded-[25px] shadow-2xl overflow-hidden text-slate-900">
            <div class="bg-[#1d4ed8] pt-12 pb-8 text-center text-white">
                <h1 class="text-4xl font-black tracking-tight mb-1">APS</h1>
                <p class="text-[11px] font-bold uppercase tracking-[0.2em] opacity-90">Portal Prestadores</p>
            </div>
            <div class="p-10 space-y-6">
                <div>
                    <label class="block text-[11px] font-black text-[#94a3b8] uppercase mb-2 tracking-wider ml-1">Código SISALRIL</label>
                    <input type="text" id="user-code" placeholder="Ingrese su código" class="w-full px-5 py-4 bg-white border border-[#e2e8f0] rounded-[15px] text-slate-500 outline-none">
                </div>
                <div>
                    <label class="block text-[11px] font-black text-[#94a3b8] uppercase mb-2 tracking-wider ml-1">Contraseña</label>
                    <input type="password" id="user-pass" placeholder="••••••••" class="w-full px-5 py-4 bg-white border border-[#e2e8f0] rounded-[15px] text-slate-500 outline-none">
                </div>
                <button onclick="handleLogin()" class="w-full bg-[#2563eb] text-white font-bold py-4 rounded-[15px] shadow-lg uppercase text-sm tracking-widest hover:bg-blue-700 transition">Iniciar Sesión</button>
            </div>
        </div>
    </div>

    <!-- PORTAL PRINCIPAL -->
    <div id="portal-section" class="hidden-section pb-20 bg-slate-100 min-h-screen text-slate-900">
        <header class="bg-[#1e293b] text-white shadow-xl">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center border-b border-slate-700">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-600 h-10 w-10 rounded-lg flex items-center justify-center font-bold text-xl">R</div>
                    <div>
                        <h2 class="font-bold text-sm tracking-tight uppercase">Portal de Radicaciones</h2>
                        <p id="header-prestador" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest"></p>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-[10px] font-black border border-red-500/50 px-4 py-2 rounded-lg text-red-400 hover:bg-red-500/10 transition uppercase">Salir</button>
            </div>
            <nav class="max-w-7xl mx-auto px-6 flex gap-8">
                <button id="nav-nueva" onclick="showTab('nueva')" class="py-4 text-xs font-black uppercase tracking-widest nav-active transition">Nueva Radicación</button>
                <button id="nav-historial" onclick="showTab('historial')" class="py-4 text-xs font-black uppercase tracking-widest text-slate-400 hover:text-white transition">Historial / Estados</button>
            </nav>
        </header>

        <main class="max-w-7xl mx-auto p-8">
            <div id="tab-nueva" class="space-y-6">
                
                <!-- CAMPOS ENCABEZADO -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha NCF</label>
                        <input type="date" id="fecha-ncf" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Número NCF</label>
                        <input type="text" id="ncf" placeholder="E310000000187" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-mono uppercase">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Correo Resumen</label>
                        <input type="email" id="email-resumen" placeholder="notificaciones@prestador.com" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    </div>
                </div>

                <!-- BUSCADOR -->
                <div class="bg-white rounded-2xl shadow-sm border p-6">
                    <h3 class="font-bold text-slate-700 text-[10px] uppercase mb-4 tracking-widest italic">🔍 Búsqueda de Autorizaciones</h3>
                    <div class="flex gap-3">
                        <input type="text" id="search-input" placeholder="Ingrese Número (Ej: 3726192)..." class="flex-1 p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500">
                        <button onclick="buscarAuth()" class="bg-[#1e293b] text-white px-10 rounded-xl font-bold hover:bg-blue-700 transition uppercase text-xs">Buscar</button>
                    </div>
                </div>

                <!-- TABLA LOTE (Banner eliminado) -->
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-slate-50 text-[10px] text-slate-500 uppercase">
                                    <th class="px-6 py-5 text-left font-bold">Autor.</th>
                                    <th class="px-6 py-5 text-left font-bold">Nombre del Afiliado</th>
                                    <th class="px-6 py-5 text-right font-bold">Valor Autorización</th>
                                    <th class="px-6 py-5 text-right font-bold text-red-500">Glosa</th>
                                    <th class="px-6 py-5 text-right font-bold text-blue-600">A Pagar</th>
                                    <th class="px-6 py-5 text-left font-bold">Tipos de glosas aplicadas</th>
                                    <th class="px-6 py-5"></th>
                                </tr>
                            </thead>
                            <tbody id="lote-body" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                    <div class="p-8 bg-[#0f172a] text-white flex justify-between items-center">
                        <div class="flex gap-12">
                            <div><p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Cant. Radicaciones</p><p id="total-cant" class="text-4xl font-black">0</p></div>
                            <div><p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Valor Neto Total</p><p id="total-monto" class="text-4xl font-black">$ 0.00</p></div>
                        </div>
                        <button onclick="finalizar()" class="bg-[#2ecc71] text-[#0f172a] px-12 py-5 rounded-2xl font-black text-xl hover:bg-[#27ae60] transition shadow-xl uppercase">Finalizar y Guardar</button>
                    </div>
                </div>
            </div>
            
            <div id="tab-historial" class="hidden-section">
                <div class="bg-white rounded-xl p-20 text-center border-2 border-dashed border-slate-200">
                    <p class="text-slate-400 font-bold uppercase text-xs">No hay registros en el historial.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [];

        function handleLogin() {
            const user = document.getElementById('user-code').value;
            if (user) {
                document.getElementById('header-prestador').innerText = `${user} - POLICLINICO UNION S R L`;
                document.getElementById('login-section').classList.add('hidden-section');
                document.getElementById('portal-section').classList.remove('hidden-section');
            }
        }

        function showTab(tab) {
            document.getElementById('tab-nueva').classList.toggle('hidden-section', tab !== 'nueva');
            document.getElementById('tab-historial').classList.toggle('hidden-section', tab !== 'historial');
            document.getElementById('nav-nueva').className = tab === 'nueva' ? "py-4 text-xs font-black uppercase tracking-widest nav-active" : "py-4 text-xs font-black uppercase tracking-widest text-slate-400";
            document.getElementById('nav-historial').className = tab === 'historial' ? "py-4 text-xs font-black uppercase tracking-widest nav-active" : "py-4 text-xs font-black uppercase tracking-widest text-slate-400";
        }

        function buscarAuth() {
            const val = document.getElementById('search-input').value;
            if (val) {
                // Simulación de carga de datos 3726192 y 3726193
                items.push({ id: val, nombre: 'JUNIEL ABREU MARTE', bruto: 8067.33, glosa: 0, neto: 8067.33, motivo: 'Tarifa' });
                render();
                document.getElementById('search-input').value = '';
            }
        }

        function render() {
            const b = document.getElementById('lote-body');
            b.innerHTML = '';
            let total = 0;
            items.forEach((it, i) => {
                total += it.neto;
                b.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-mono font-bold text-blue-600">${it.id}</td>
                        <td class="px-6 py-4 font-bold uppercase text-[11px]">${it.nombre}</td>
                        <td class="px-6 py-4 text-right font-medium">$ ${it.bruto.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-red-500 font-bold">$ ${it.glosa.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-blue-600 font-black">$ ${it.neto.toLocaleString()}</td>
                        <td class="px-6 py-4 text-[10px] font-bold text-slate-400 italic">${it.motivo}</td>
                        <td class="px-6 py-4 text-center cursor-pointer hover:text-red-500" onclick="items.splice(${i},1);render()">✕</td>
                    </tr>`;
            });
            document.getElementById('total-cant').innerText = items.length;
            document.getElementById('total-monto').innerText = `$ ${total.toLocaleString()}`;
        }

        function finalizar() {
            const f = document.getElementById('fecha-ncf').value;
            const n = document.getElementById('ncf').value;
            const e = document.getElementById('email-resumen').value;

            if (!f || !n || !e || items.length === 0) {
                Swal.fire({
                    title: 'Incompleto',
                    text: 'Llene todos los campos.',
                    icon: 'warning',
                    confirmButtonColor: '#3b82f6'
                });
            } else {
                Swal.fire('¡Éxito!', 'Radicación guardada.', 'success').then(() => location.reload());
            }
        }
    </script>
</body>
</html>
