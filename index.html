<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Prestadores - SISALRIL</title>
    <!-- Tailwind CSS para diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-section { display: none !important; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- SECCIÓN: LOGIN (Se muestra por defecto) -->
    <div id="login-section" class="flex items-center justify-center min-h-screen p-4 bg-blue-900">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-blue-900">Bienvenido</h2>
                <p class="text-gray-500 italic">Ingrese su Código SISALRIL</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Usuario (Código SISALRIL)</label>
                    <input type="text" id="user-code" class="w-full mt-1 p-3 border-2 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Contraseña</label>
                    <input type="password" id="user-pass" class="w-full mt-1 p-3 border-2 rounded-lg focus:border-blue-500 outline-none">
                </div>
                <!-- Botón de Iniciar Sesión con lógica directa -->
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg active:scale-95">
                    INICIAR SESIÓN
                </button>
            </div>
        </div>
    </div>

    <!-- SECCIÓN: PORTAL (Oculto por defecto) -->
    <div id="portal-section" class="hidden-section p-4 lg:p-10">
        <div class="max-w-7xl mx-auto space-y-6">
            <!-- Barra de Usuario -->
            <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center border-l-8 border-blue-600">
                <div>
                    <p class="text-xs text-gray-500 font-bold uppercase">Prestador Autenticado</p>
                    <p id="display-prestador" class="text-lg font-bold text-gray-800"></p>
                </div>
                <button onclick="location.reload()" class="text-red-500 font-bold text-sm">Cerrar Sesión 🚪</button>
            </div>

            <!-- Formulario de Radicación -->
            <div class="bg-white rounded-2xl shadow-xl p-6 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-b pb-6">
                    <div>
                        <label class="block text-xs font-black text-gray-500">FECHA NCF</label>
                        <input type="date" id="fecha-ncf" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500">NÚMERO NCF</label>
                        <input type="text" id="ncf" placeholder="E310000000187" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500">CORREO RESUMEN</label>
                        <input type="email" id="email-resumen" class="w-full p-2 border rounded">
                    </div>
                </div>

                <!-- Buscador -->
                <div class="flex gap-2">
                    <input type="text" id="search-autorizacion" placeholder="Ingrese Número Autorización..." class="flex-1 p-2 border-2 border-blue-100 rounded">
                    <button onclick="buscarAutorizacion()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">AGREGAR</button>
                </div>

                <!-- Grilla -->
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-100 uppercase">
                            <tr>
                                <th class="p-3 text-left">Aut.</th>
                                <th class="p-3 text-left">Servicio</th>
                                <th class="p-3 text-right">Monto</th>
                                <th class="p-3 text-center">Glosa</th>
                                <th class="p-3 text-left">Motivo</th>
                                <th class="p-3 text-right">Total</th>
                            </tr>
                        </thead>
                        <tbody id="grilla-body"></tbody>
                    </table>
                </div>

                <!-- Footer Totales -->
                <div class="flex justify-between items-center bg-gray-50 p-6 rounded-xl">
                    <div class="flex gap-8">
                        <div><p class="text-xs font-bold">CANTIDAD</p><p id="total-cantidad" class="text-2xl font-bold">0</p></div>
                        <div><p class="text-xs font-bold">TOTAL</p><p id="total-monto" class="text-2xl font-bold text-blue-700">$ 0.00</p></div>
                    </div>
                    <button onclick="finalizar()" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold shadow-lg">GUARDAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let autorizaciones = [];

        // FUNCIÓN CLAVE: Lógica de entrada
        function handleLogin() {
            const user = document.getElementById('user-code').value;
            const pass = document.getElementById('user-pass').value;

            // Validación simple para el mockup
            if (user.trim() !== "" && pass.trim() !== "") {
                document.getElementById('display-prestador').innerText = user + " - POLICLINICO UNION S R L";
                document.getElementById('login-section').classList.add('hidden-section');
                document.getElementById('portal-section').classList.remove('hidden-section');
            } else {
                alert("Por favor, ingrese Usuario y Contraseña");
            }
        }

        function buscarAutorizacion() {
            const num = document.getElementById('search-autorizacion').value;
            if(!num) return;
            autorizaciones.push({ id: num, desc: "SALA DE URGENCIA", monto: 1250, glosa: 0 });
            render();
            document.getElementById('search-autorizacion').value = '';
        }

        function updateGlosa(index, val) {
            autorizaciones[index].glosa = parseFloat(val) || 0;
            render();
        }

        function render() {
            const body = document.getElementById('grilla-body');
            body.innerHTML = '';
            let total = 0;
            autorizaciones.forEach((item, i) => {
                const neto = item.monto - item.glosa;
                total += neto;
                body.innerHTML += `
                    <tr class="border-b">
                        <td class="p-3 font-bold">${item.id}</td>
                        <td class="p-3">${item.desc}</td>
                        <td class="p-3 text-right">$${item.monto}</td>
                        <td class="p-3 text-center"><input type="number" onchange="updateGlosa(${i}, this.value)" value="${item.glosa}" class="w-20 border text-center text-red-600"></td>
                        <td class="p-3">
                            <select class="border p-1 text-xs"><option>Pertinencia</option><option>Tarifa</option></select>
                        </td>
                        <td class="p-3 text-right font-bold">$${neto.toFixed(2)}</td>
                    </tr>`;
            });
            document.getElementById('total-cantidad').innerText = autorizaciones.length;
            document.getElementById('total-monto').innerText = "$" + total.toFixed(2);
        }

        function finalizar() {
            const ncf = document.getElementById('ncf').value;
            if(!ncf || autorizaciones.length === 0) return alert("Faltan datos o autorizaciones");
            alert("Radicación Guardada con Éxito. N°: " + Math.floor(Math.random()*900000));
            location.reload();
        }
    </script>
</body>
</html>
